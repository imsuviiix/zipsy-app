# Render.com Blueprint — New + → Blueprint 에서 이 레포를 연결하면 자동으로 설정된다
services:
  - type: web
    name: zipsy-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements-bot.txt
    startCommand: python server_app.py
    healthCheckPath: /
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: UPSTAGE_API_KEY
        sync: false
      - key: ALLOWED_CHAT_IDS
        value: ""
